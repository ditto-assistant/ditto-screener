name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - name: Type-check the minimum supported Python version
        if: matrix.python-version == '3.11'
        run: uv run mypy ditto_screener
      - run: uv run pytest -m "not integration"
      - run: docker build -t ditto-screener:${{ github.sha }} .

  screener-core-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check out canonical DittoBench starter kit
        uses: actions/checkout@v4
        with:
          repository: ditto-assistant/dittobench-starter-kit
          ref: 106076a40e4214cda821dfd0bee5c9c6785d425c
          path: dittobench-starter-kit

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync --group dev

      - name: Run real build and health smoke with no default /run call
        env:
          DITTO_STARTER_KIT_DIR: ${{ github.workspace }}/dittobench-starter-kit
        run: >-
          uv run pytest -m integration
          tests/test_gate_docker_integration.py
          tests/test_l2_review.py -vv
