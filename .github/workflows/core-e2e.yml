name: Daily anti-cheat core E2E

on:
  schedule:
    # Avoid the top of the hour, when GitHub schedules are most likely to queue.
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screener-core-e2e:
    name: Real Docker starter and L2 harness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check out canonical DittoBench starter kit
        uses: actions/checkout@v4
        with:
          repository: ditto-assistant/dittobench-starter-kit
          ref: 106076a40e4214cda821dfd0bee5c9c6785d425c
          path: dittobench-starter-kit

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11
      - run: uv sync --group dev

      - name: Run real build and health smoke with no default /run call
        env:
          DITTO_STARTER_KIT_DIR: ${{ github.workspace }}/dittobench-starter-kit
        run: >-
          uv run pytest -m integration
          tests/test_gate_docker_integration.py
          tests/test_l2_review.py -vv

      - name: Publish scheduled coverage status
        if: always()
        run: |
          {
            echo "## Real Docker anti-cheat E2E"
            echo
            echo "Result: **${{ job.status }}**"
            echo
            echo "Covered the pinned canonical starter build/health boundary and isolated L2 coding harness."
          } >> "$GITHUB_STEP_SUMMARY"
